name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pdo_sqlite
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: composer install --no-interaction --prefer-dist
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: touch database/database.sqlite
      - run: php artisan migrate --force
      - run: composer format:check
      - run: composer analyse
      - run: composer test
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: public-build
          path: public/build

  database:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database:
          - name: mysql-8
            image: mysql:8.4
          - name: mariadb-10-11
            image: mariadb:10.11
    services:
      database:
        image: ${{ matrix.database.image }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: noval_test
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: noval_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pdo_mysql
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: php artisan migrate:fresh --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: noval_test
          DB_USERNAME: root
          DB_PASSWORD: root
      - run: php artisan test tests/Feature/CoreMvpVerticalSliceTest.php
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: noval_test
          DB_USERNAME: root
          DB_PASSWORD: root
